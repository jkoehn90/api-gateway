spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/auth/**
              filters:
                - AuthenticationFilter

            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/products/**
              filters:
                - AuthenticationFilter

            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/orders/**
              filters:
                - AuthenticationFilter

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: your-256-bit-secret-key-here-make-it-long-and-random